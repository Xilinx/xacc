- title: "A Development Platform for Managed Heterogeneous Accelerated Compute Clusters: A Case Study on ETH Zurich’s AMD HACC"
  author: "Javier Moya"
  institution: "ETH Zurich"
  link: "https://dl.acm.org/doi/10.1145/3805700"
  abstract: |
    "The growing demand for performance, energy efficiency, and domain-specific acceleration has driven a shift toward heterogeneous computing platforms. While hyperscaler cloud platforms offer broad access to compute resources, they often lack the flexibility required by advanced research workloads. In response, research institutions are increasingly deploying self-managed heterogeneous clusters, which remain difficult to maintain, configure, and use effectively. The Heterogeneous Accelerated Compute Clusters (HACCs) initiative, supported by the AMD University Program, addresses this by equipping select institutions with clusters composed of CPUs, GPUs, and adaptive devices for high-performance computing and AI research. This paper presents two complementary tools developed for such systems: HACC Management and Development. HACC Management is an Ansible-based automation framework for provisioning and maintaining HACC-like infrastructure in a reproducible and scalable way. HACC Development (hdev) is a lightweight Bash-based CLI that streamlines the development and deployment of heterogeneous applications. It orchestrates both environment and infrastructure setup and provides ready-to-use templates—example projects for user reference—that enable rapid iteration on real hardware. We demonstrate the design and capabilities of both tools using ETH Zurich's HACC as a case study. Our approach reduces operational overhead, enables faster prototyping, and provides a foundation for community-driven expansion of heterogeneous workflow support."

- title: "A heuristic approach for near Pareto-optimal design space exploration in Approximate High-Level Synthesis"
  author: "Tiago Da Silva Almeida"
  institution: "Universidade Federal do Tocantins"
  link: "https://www.sciencedirect.com/science/article/abs/pii/S0167926025002950"
  abstract: |
    "Approximate Computing can optimize resource usage in HLS (High-Level Synthesis) by mapping certain operations to components that have lower resource utilization but introduce small errors into application outputs. A fundamental challenge is identifying a set of approximate components for implementing operators in an accelerator design while achieving optimal resource utilization and accuracy. We introduce an input-aware heuristic approach that uses application inputs to model output errors more effectively. In this approach, operators in accelerators, such as adders and multipliers, are mapped to a library of precharacterized approximate components. Applications are executed with a set of training inputs and candidate solutions are selected based on a metric that combines output errors and estimated resource utilization. The results demonstrate that the approach can find appropriate approximate designs for a given error threshold. For image processing applications, the input-aware heuristic was able to save LUT and FF by up to 55% for less than 25% output degradation. Similar savings were shown for a CNN model with less than 0.8% accuracy degradation."

- title: "AgRefactor: Refactoring for HLS Compatibility with a Self-Evolving Agentic Workflow"
  author: "Yang Zou"
  institution: "CMU, UCLA"
  link: "https://dl.acm.org/doi/abs/10.1145/3748173.3779566"
  abstract: |
    "High-Level Synthesis (HLS) provides a fast path from concepts to silicon, but practical HLS design flows begin with a tedious step: refactoring software into HLS-compatible programs. Converting real-world software remains challenging due to restrictive language support and the gap between software and hardware programming practices, and this preparatory phase can take domain experts days even for an initial synthesizable design. Existing automated refactoring methods and recent LLM-based workflows partially address this problem, yet they often fall short in generalizability, scalability, and cost efficiency. Our key insight is that long-term memory for self-evolving agents, combined with tool-integrated refactoring, enables accurate and scalable conversion of real-world software into HLS-compatible programs. We introduce AgRefactor, an LLM-based multi-agent workflow that equips agents with long-term memory specialized for HLS refactoring, using a dedicated knowledge format and a hybrid distance metric to measure task similarity. To reduce cost and improve scalability, AgRefactor integrates automated refactoring tools by coupling LLM-driven rewrites with HeteroRefactor. On 9 out of 11 challenging real-world benchmarks, which are 5-10× longer than the most complex cases studied in prior work, AgRefactor outperforms state-of-the-art approaches. Further pragma optimization yields a 2.65× geometric mean speedup over the initial synthesizable design. AgRefactor is fully automated, easy to reproduce, and will be open-sourced upon acceptance."

- title: "EQUIP: EQUivariant preserving In-Place updates for Efficient Token Pruning"
  author: ""
  institution: "IISC"
  link: "https://openreview.net/forum?id=v3MSIxFjqe"
  abstract: |
    "Token-pruning has emerged as a pivotal focus in large language models (LLMs), driven by the need to enhance model efficiency while pre serving accuracy, especially for large sequence lengths. However, the eviction operation of token pruning methods causes “holes” in KV tensors, posing two major challenges: (1) The shift operation required to make the KV tensor contiguous results in significant copy overheads; (2) The changes in position indices due to token eviction leads to increased computational requirements for Rotary Positional Encoding(RoPE). To address these issues, we introduce (EQUIP), an EQUivariant preserving in-place token update mechanism that ensures the equivariance property of the operations performed in the attention computation. EQUIP offers two fundamental advantages: First, it combines eviction and a subsequent token insertion into an in-place replacement operation, which reduces the KV cache copy overheads significantly. Second, EQUIP reduces recomputation of rotation operations through a combination of in-place update, caching and a re-indexing strategy. Together, these optimizations enable EQUIP with StreamingLLM to achieve geomean speedups of 1.62× (or 1.47×) on CPU (GPU) over StreamingLLM, and 3.45× (or 1.86x) on CPU (GPU) over H2O. EQUIP with Paged Attention achieves speedups of 4.18x (2.61x) on CPU (GPU) over auto-regressive032 baselines. EQUIP preserves the same model accuracy as baseline pruning methods."

- title: "FARE: A Fine-grained Pipelined Reconfigurable FlashAttention Kernel"
  author: "Kaushikkumar S. Rathva"
  institution: "IISc"
  link: "https://dl.acm.org/doi/10.1145/3748173.3779572"
  abstract: |
    "Transformer algorithm-based large machine learning (ML) models are widely used in various application domains [3]. We observe that the attention operation of a transformer algorithm consumes a significant amount of execution time when executed on a GPU, affecting real-time latency for inference. While other major operations in the transformer algorithm (e.g., feed-forward operation) consist of weight stationary matrix multiplications, attention consists of non-linear operations and a sequence of matrix multiplications. This sequence of operations in attention results in memory access bottlenecks in GPUs, directly affecting the latency. While there exists an implementation of an attention kernel to minimize memory access bottlenecks -- FlashAttention [1] -- it lacks reconfigurability. Moreover, GPUs provide limited knobs for customizing the attention datapath. There exist application-specific accelerators for ML models with transformer algorithms, but they too lack reconfigurability [2]. FPGAs, in contrast, enable application-specific dataflows, giving us full control over the design. Therefore, in this work, we propose a fine-grained pipelined reconfigurable flash-attention kernel targeting FPGA platforms. The fine-grained pipelining allows us to execute different stages of the attention mechanism in parallel. It carefully constructs different stages of a flash-attention kernel to reduce resource usage as well as improve the performance. As ML models scale and energy demands increase, this makes FPGA-based attention the sustainable choice. Experimental evaluation on Xilinx Zedboard (Zynq 7000) with different parameters of the attention kernel shows that our proposed design improves the performance by up to 2.9× while reducing the resource usage by up to 16.50× over state-of-the-art [4]."

- title: "FlexLLM: Composable HLS Library for Flexible Hybrid LLM Accelerator Design"
  author: "Jiahao Zhang"
  institution: "UCLA, AMD"
  link: "https://arxiv.org/abs/2601.15710"
  abstract: |
    "We present FlexLLM, a composable High-Level Synthesis (HLS) library for rapid development of domain-specific LLM accelerators. FlexLLM exposes key architectural degrees of freedom for stage-customized inference, enabling hybrid designs that tailor temporal reuse and spatial dataflow differently for prefill and decode, and provides a comprehensive quantization suite to support accurate low-bit deployment. Using FlexLLM, we build a complete inference system for the Llama-3.2 1B model in under two months with only 1K lines of code. The system includes: (1) a stage-customized accelerator with hardware-efficient quantization (12.68 WikiText-2 PPL) surpassing SpinQuant baseline, and (2) a Hierarchical Memory Transformer (HMT) plug-in for efficient long-context processing. On the AMD U280 FPGA at 16nm, the accelerator achieves 1.29\times end-to-end speedup, 1.64\times higher decode throughput, and 3.14\times better energy efficiency than an NVIDIA A100 GPU (7nm) running BF16 inference; projected results on the V80 FPGA at 7nm reach 4.71\times, 6.55\times, and 4.13\times, respectively. In long-context scenarios, integrating the HMT plug-in reduces prefill latency by 23.23\times and extends the context window by 64\times, delivering 1.10\times/4.86\times lower end-to-end latency and 5.21\times/6.27\times higher energy efficiency on the U280/V80 compared to the A100 baseline. FlexLLM thus bridges algorithmic innovation in LLM inference and high-performance accelerators with minimal manual effort."

- title: "NetCilk: Extending Task-Level Parallelism Seamlessly across FPGAs"
  author: "Mohamed Shahawy"
  institution: "EPFL"
  link: ""
  github: "https://github.com/EPFL-LAP/HardCilk/tree/fccm26-netcilk-hardware"
  abstract: |
    "Task-level parallelism (TLP) is a long-standing approach in parallelizing control-dominated algorithms in software and has recently drawn interest in hardware acceleration thanks to the simplicity of managing tasks in hardware. Several TLP frameworks for FPGAs, like ParallelXL and HardCilk, leverage high-level synthesis to facilitate the acceleration of efficient TLP algorithms on FPGAs. In particular, HardCilk managed to efficiently deploy up to 256 processing elements (PEs) on a single FPGA system for microbenchmarks. However, for practical applications, it is usually not possible to fit more than a dozen PEs per FPGA, a limitation that reduces the potential of TLP. In this work, we propose an architecture that exploits the latency insensitivity of TLP and the high-bandwidth networking available in modern FPGAs to increase the number of available PEs for a given workload. We show that it is possible to span multiple FPGAs without loss of efficiency and with only a small resource overhead.We conduct experiments that distribute 128 PEs among two, four, and eight FPGAs and compare the efficiency with that of a single FPGA HardCilk system for a representative set of benchmarks. Our results accentuate the importance of an effective task movement policy across FPGAs to achieve scalability, particularly under specific network latency and bandwidth configurations. We also develop three real-world applications and test with two FPGAs setup, achieving almost perfect scalability. Our architecture achieves multi-FPGA extension with less than 3% of additional resource utilization."

- title: "RidgeWalker: Perfectly Pipelined Graph Random Walks on FPGAs"
  author: "Hongshi Tan"
  institution: "National University of Singapore"
  link: "https://arxiv.org/abs/2601.11057"
  github: "https://github.com/Xtra-Computing/RidgeWalker"
  abstract: |
    "Graph Random Walks (GRWs) offer efficient approximations of key graph properties and have been widely adopted in many applications. However, GRW workloads are notoriously difficult to accelerate due to their strong data dependencies, irregular memory access patterns, and imbalanced execution behavior. While recent work explores FPGA-based accelerators for GRWs, existing solutions fall far short of hardware potential due to inefficient pipelining and static scheduling. This paper presents RidgeWalker, a high-performance GRW accelerator designed for datacenter FPGAs. The key insight behind RidgeWalker is that the Markov property of GRWs allows decomposition into stateless, fine-grained tasks that can be executed out-of-order without compromising correctness. Building on this, RidgeWalker introduces an asynchronous pipeline architecture with a feedback-driven scheduler grounded in queuing theory, enabling perfect pipelining and adaptive load balancing. We prototype RidgeWalker on datacenter FPGAs and evaluated it across a range of GRW algorithms and real-world graph datasets. Experimental results demonstrate that RidgeWalker achieves an average speedup of 7.0x over state-of-the-art FPGA solutions and 8.1x over GPU solutions, with peak speedups of up to 71.0x and 22.9x, respectively."

